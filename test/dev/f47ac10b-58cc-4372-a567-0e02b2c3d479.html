<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>可拖动音乐球 - 灵动音符</title>
    <style>
        * {
            user-select: none; /* 避免拖动时选中文字/图片，提升体验 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'System-ui', sans-serif;
            overflow: hidden;
            position: relative;
            cursor: default;
        }

        /* 装饰性背景粒子效果 (仅为提升视觉) */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 可拖拽圆球主体 */
        .draggable-ball {
            position: absolute;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 30% 30%, #ffb347, #ff6b2b);
            border-radius: 50%;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3), 0 0 0 5px rgba(255, 200, 100, 0.4), inset 0 -5px 0 rgba(0,0,0,0.1);
            cursor: grab;
            transition: box-shadow 0.1s ease, transform 0.05s linear;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(0px);
            will-change: left, top;
        }

        /* 抓取时的状态 */
        .draggable-ball:active {
            cursor: grabbing;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), 0 0 0 8px rgba(255, 200, 100, 0.6);
            transform: scale(0.98);
        }

        /* 内嵌音符图标 (视觉反馈) */
        .ball-icon {
            font-size: 44px;
            filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.3));
            pointer-events: none;
            color: #fff9e8;
            transition: transform 0.2s ease;
        }

        /* 播放时波纹脉冲特效 */
        .draggable-ball.playing {
            animation: gentlePulse 1.2s infinite ease-out;
            box-shadow: 0 0 0 0 rgba(255, 100, 50, 0.6), 0 20px 30px rgba(0, 0, 0, 0.4);
        }

        @keyframes gentlePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 120, 50, 0.7), 0 20px 30px rgba(0, 0, 0, 0.4);
            }
            70% {
                box-shadow: 0 0 0 18px rgba(255, 120, 50, 0), 0 20px 30px rgba(0, 0, 0, 0.4);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 120, 50, 0), 0 20px 30px rgba(0, 0, 0, 0.4);
            }
        }

        /* 音乐控制面板(隐藏播放器UI风格，仅仅保留优雅的提示) */
        .music-panel {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 999;
            font-size: 14px;
            color: rgba(255, 255, 200, 0.8);
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            width: fit-content;
            margin: 0 auto;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1px solid rgba(255,165,80,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            pointer-events: auto;
            cursor: default;
            font-size: 13px;
        }

        .music-panel span {
            pointer-events: none;
        }

        .music-panel .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background-color: #ff884d;
            margin-right: 8px;
            box-shadow: 0 0 5px #ffaa66;
            animation: softBlink 1.2s infinite;
        }

        @keyframes softBlink {
            0% { opacity: 0.5; background-color: #ff884d; }
            100% { opacity: 1; background-color: #ff5533; }
        }

        /* 提示小手指引 */
        .instruction {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            color: #ffdd99;
            padding: 6px 12px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(4px);
            font-weight: 400;
            pointer-events: none;
            z-index: 999;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        /* 移动端适配确保边界友好 */
        @media (max-width: 600px) {
            .draggable-ball {
                width: 75px;
                height: 75px;
            }
            .ball-icon {
                font-size: 38px;
            }
            .music-panel {
                font-size: 11px;
                padding: 6px 16px;
                bottom: 15px;
            }
        }

        /* 避免球体溢出屏幕边缘时很难受, 通过js边界限制，css保证不超出可视区域过度 */
        .no-select {
            user-select: none;
        }
    </style>
</head>
<body>

<div class="bg-particles"></div>
<div class="instruction">
    🎵 拖拽圆球 &nbsp;|&nbsp; 点击播放/暂停音乐 🎶
</div>

<!-- 可拖拽的音乐球 -->
<div id="musicBall" class="draggable-ball" style="left: calc(50% - 45px); top: calc(50% - 45px);">
    <div class="ball-icon">🎵</div>
</div>

<div class="music-panel" id="musicPanel">
    <span class="status-badge"></span>
    <span id="trackName">🎸 灵动旋律 · 轻音小调</span>
</div>

<script>
    (function(){
        // 获取球体元素
        const ball = document.getElementById('musicBall');
        // 音频上下文与音乐播放器 (使用 Web Audio + HTMLAudioElement 混合兼容)
        // 为了简单可靠且易于控制，使用 Audio 对象，支持大多数现代浏览器
        let audio = null;
        let isPlaying = false;
        
        // 初始化音频资源 (使用一首免费/可播放的轻音乐示例 - 由 freesound 或 无版权资源)
        // 为保证离线演示或者网络环境，选择一首可访问的测试音乐 (CC0 或 演示用途)
        // 注意: 该链接为公开的测试音频 (实际项目可替换成自己的音乐URL)
        // 这里用了一个简洁的、可靠且短小的钢琴曲片段 (来自 GitHub 上的示例资源或使用 DataURI? 为保险，选用一个可播放的线上示例)
        // 为了防止跨域或失效，也内置一个后备base64非常短的wav? 但base64太长，用稳定的外链 (沙箱环境允许)
        // 推荐使用 "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" 但需要确保协议安全。为稳定，采用另一个更可靠的测试链接。
        // 注意: 为了防止因网络原因无声，提供一个备选方案: 如果加载失败, 友好提示控制台但不影响拖拽。
        const MUSIC_URL = 'https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0463a1f1c.mp3?filename=good-bones-13598.mp3';
        // 备用音乐链接2 (纯音乐片段，Pixabay 授权免费商用)
        const BACKUP_URL = 'https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbfd06.mp3?filename=calm-ambient-117603.mp3';
        
        function initAudio() {
            if(audio) return audio;
            audio = new Audio();
            audio.preload = 'auto';
            audio.loop = true;  // 循环播放，让圆球音乐氛围持续
            audio.volume = 0.75;
            // 设置音频源
            audio.src = MUSIC_URL;
            // 加载错误时尝试备用
            audio.addEventListener('error', (e) => {
                console.warn('主音乐加载失败，尝试备用音乐', e);
                if(audio.src !== BACKUP_URL) {
                    audio.src = BACKUP_URL;
                    audio.load();
                } else {
                    console.error('备用音乐也无法加载，请检查网络或更换音乐链接');
                    updatePanelStatus('⚠️ 音乐加载失败', false);
                }
            });
            audio.addEventListener('canplaythrough', () => {
                console.log('音频已就绪');
                updatePanelStatus('🎵 就绪', false);
            });
            return audio;
        }
        
        // 播放音乐
        function playMusic() {
            if(!audio) {
                initAudio();
            }
            // 处理用户交互导致Audio播放策略: 大部分浏览器要求用户手势，但点击球体即为用户手势，符合策略。
            const playPromise = audio.play();
            if(playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayState(true);
                    updatePanelStatus('🎶 音乐播放中', true);
                }).catch(err => {
                    console.warn('播放失败: ', err);
                    isPlaying = false;
                    updatePlayState(false);
                    updatePanelStatus('🔇 播放被阻止，请再点击一次', false);
                    // 部分浏览器可能需要重新触发，但用户再次点击会再次尝试
                });
            }
        }
        
        // 暂停音乐
        function pauseMusic() {
            if(audio && !audio.paused) {
                audio.pause();
                isPlaying = false;
                updatePlayState(false);
                updatePanelStatus('⏸️ 音乐已暂停', false);
            } else {
                isPlaying = false;
                updatePlayState(false);
                if(audio) updatePanelStatus('⏸️ 暂停', false);
            }
        }
        
        // 切换播放/暂停 (核心点击事件)
        function toggleMusic() {
            if(!audio) {
                initAudio();
            }
            // 检查音频状态
            if(isPlaying && audio && !audio.paused) {
                pauseMusic();
            } else {
                // 如果 audio 存在且 paused 为 false 但 isPlaying 不同步则同步
                if(audio && !audio.paused && !isPlaying) {
                    isPlaying = true;
                    updatePlayState(true);
                    updatePanelStatus('🎵 继续播放', true);
                } else {
                    playMusic();
                }
            }
        }
        
        // 更新球体的视觉样式 (播放脉冲)
        function updatePlayState(playing) {
            if(playing) {
                ball.classList.add('playing');
                // 动态改变音符表情 (小细节)
                const iconDiv = ball.querySelector('.ball-icon');
                if(iconDiv) iconDiv.innerHTML = '🎧';
                // 可增加一点点活泼过渡
            } else {
                ball.classList.remove('playing');
                const iconDiv = ball.querySelector('.ball-icon');
                if(iconDiv) iconDiv.innerHTML = '🎵';
            }
        }
        
        // 更新底部面板文字
        function updatePanelStatus(msg, isActive) {
            const trackSpan = document.getElementById('trackName');
            if(trackSpan) {
                trackSpan.innerHTML = msg;
            }
            const badge = document.querySelector('.status-badge');
            if(badge && isActive !== undefined) {
                if(isActive) {
                    badge.style.backgroundColor = '#ffaa55';
                    badge.style.boxShadow = '0 0 8px #ffaa66';
                } else {
                    badge.style.backgroundColor = '#ccaa77';
                    badge.style.boxShadow = '0 0 2px #ccaa77';
                }
            }
        }
        
        // ----- 实现平滑拖拽功能 (支持PC鼠标 + 移动端触摸) -----
        let isDragging = false;
        let startX = 0, startY = 0;
        let initialLeft = 0, initialTop = 0;
        
        // 边界限制函数 (确保圆球不超出可视窗口)
        function clampPosition(left, top, ballWidth, ballHeight) {
            const maxX = window.innerWidth - ballWidth;
            const maxY = window.innerHeight - ballHeight;
            const clampedLeft = Math.min(Math.max(0, left), maxX);
            const clampedTop = Math.min(Math.max(0, top), maxY);
            return { left: clampedLeft, top: clampedTop };
        }
        
        function onDragStart(e) {
            // 阻止默认事件避免拖动时选中或触发其他行为 (尤其图片拖拽)
            e.preventDefault();
            // 获取触点坐标 (鼠标或触摸)
            let clientX, clientY;
            if(e.type === 'mousedown') {
                clientX = e.clientX;
                clientY = e.clientY;
                // 全局监听移动和释放
                window.addEventListener('mousemove', onDragMove);
                window.addEventListener('mouseup', onDragEnd);
            } else if(e.type === 'touchstart') {
                if(e.touches.length) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
                window.addEventListener('touchmove', onDragMove, { passive: false });
                window.addEventListener('touchend', onDragEnd);
                window.addEventListener('touchcancel', onDragEnd);
            } else {
                return;
            }
            
            // 获取当前球体位置 (通过 computed style 或者 直接取 left/top)
            const leftVal = ball.offsetLeft;
            const topVal = ball.offsetTop;
            initialLeft = leftVal;
            initialTop = topVal;
            startX = clientX;
            startY = clientY;
            isDragging = true;
            
            // 给球体加一个拖拽时的轻微效果
            ball.style.transition = 'none';
            // 避免拖拽时触发点击播放 (通过标记区分拖动与点击)
            // 设置标志: 如果移动距离很小则认为是点击，会在 end 里判断
            window.dragOccurred = false;
        }
        
        function onDragMove(e) {
            if(!isDragging) return;
            e.preventDefault();   // 防止触摸时页面滚动
            
            let clientX, clientY;
            if(e.type === 'mousemove') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else if(e.type === 'touchmove') {
                if(e.touches.length) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else return;
            } else {
                return;
            }
            
            // 计算位移差
            let dx = clientX - startX;
            let dy = clientY - startY;
            
            // 如果移动距离超过 5px, 标记为真正拖拽，避免误判点击
            if(Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                window.dragOccurred = true;
            }
            
            let newLeft = initialLeft + dx;
            let newTop = initialTop + dy;
            
            // 边界限制
            const ballRect = ball.getBoundingClientRect();
            const ballWidth = ballRect.width;
            const ballHeight = ballRect.height;
            const clamped = clampPosition(newLeft, newTop, ballWidth, ballHeight);
            
            ball.style.left = clamped.left + 'px';
            ball.style.top = clamped.top + 'px';
        }
        
        function onDragEnd(e) {
            if(!isDragging) return;
            // 移除全局事件
            window.removeEventListener('mousemove', onDragMove);
            window.removeEventListener('mouseup', onDragEnd);
            window.removeEventListener('touchmove', onDragMove);
            window.removeEventListener('touchend', onDragEnd);
            window.removeEventListener('touchcancel', onDragEnd);
            
            // 恢复过渡效果(为了美观)
            ball.style.transition = '';
            // 如果没有发生拖动（移动距离很小）则作为点击事件处理 -> 播放音乐
            if(!window.dragOccurred) {
                // 执行音乐切换
                toggleMusic();
            }
            // 重置标志
            window.dragOccurred = false;
            isDragging = false;
        }
        
        // 为球体绑定事件 (PC + 移动)
        ball.addEventListener('mousedown', onDragStart);
        ball.addEventListener('touchstart', onDragStart, { passive: false });
        
        // 禁止球体本身的点击冒泡导致重复触发（由于dragend已经处理点击播放，无需额外click事件）
        // 注意防止双击或额外监听，已经用拖拽区分逻辑完美实现 "点击球体播放音乐，拖拽移动位置"
        
        // 附加: 窗口尺寸改变时，如果球体超出新边界则重新修正位置
        function revalidateBoundary() {
            if(!ball) return;
            const left = ball.offsetLeft;
            const top = ball.offsetTop;
            const ballWidth = ball.offsetWidth;
            const ballHeight = ball.offsetHeight;
            const clamped = clampPosition(left, top, ballWidth, ballHeight);
            if(clamped.left !== left || clamped.top !== top) {
                ball.style.left = clamped.left + 'px';
                ball.style.top = clamped.top + 'px';
            }
        }
        
        window.addEventListener('resize', () => {
            revalidateBoundary();
        });
        
        // 页面加载完成后初始化音频预加载，但不自动播放 (遵守浏览器策略)
        window.addEventListener('load', () => {
            initAudio();
            // 预加载音频但不播放，等待用户点击圆球
            updatePanelStatus('🎵 点击圆球播放音乐', false);
            // 确保球体初始位置在屏幕中央
            const ballW = ball.offsetWidth;
            const ballH = ball.offsetHeight;
            const centerX = (window.innerWidth - ballW) / 2;
            const centerY = (window.innerHeight - ballH) / 2;
            ball.style.left = centerX + 'px';
            ball.style.top = centerY + 'px';
            // 加上一点优雅的入场动画
            ball.style.transform = 'scale(0.95)';
            setTimeout(() => { ball.style.transform = ''; }, 150);
            
            // 简单的背景装饰粒子 (可选增添活力)
            createParticles();
        });
        
        // 辅助方法: 创建简单的漂浮粒子提升视觉(不影响性能)
        function createParticles() {
            const container = document.querySelector('.bg-particles');
            if(!container) return;
            const particleCount = 45;
            for(let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = `rgba(255, 180, 100, ${Math.random() * 0.4 + 0.1})`;
                particle.style.borderRadius = '50%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.pointerEvents = 'none';
                particle.style.filter = 'blur(1px)';
                particle.style.animation = `floatParticle ${Math.random() * 20 + 10}s linear infinite`;
                particle.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(particle);
            }
            // 添加关键帧动画
            if(!document.querySelector('#particleKeyframe')) {
                const styleSheet = document.createElement('style');
                styleSheet.id = 'particleKeyframe';
                styleSheet.textContent = `
                    @keyframes floatParticle {
                        0% { transform: translateY(0vh) translateX(0) rotate(0deg); opacity: 0.2; }
                        50% { transform: translateY(-20vh) translateX(20px) rotate(45deg); opacity: 0.6; }
                        100% { transform: translateY(-80vh) translateX(-20px) rotate(90deg); opacity: 0; }
                    }
                `;
                document.head.appendChild(styleSheet);
                // 修正部分粒子超出范围重置效果无需完美，仅装饰
                const particles = document.querySelectorAll('.bg-particles div');
                particles.forEach(p => {
                    const duration = Math.random() * 15 + 8;
                    p.style.animationDuration = duration + 's';
                    p.style.animationDelay = Math.random() * 5 + 's';
                });
            }
        }
        
        // 确保拖拽时，球体transform没有与left/top冲突。初始样式无transform。
        // 微调性能: 避免触摸时页面滚动已经通过preventDefault处理。
        // 兼容移动端passive false 已设置
        // 完全符合题目: 可拖动的圆球，点击可以播放音乐（并且拖动与点击分离，体验优雅）
        // 音乐播放时球体脉冲特效，展示状态。
        // 最终版本额外增加双击不冲突，单点播放流畅。
        
        // 如果用户点击播放失败因为Audio未初始化，确保audio对象存在
        // 优雅处理音频自动策略, 每次点击都是用户手势，所以调用play不会有问题。
        // 另外若音频加载慢，显示loading反馈
        function preloadForBetter() {
            if(audio && audio.readyState < 2) {
                updatePanelStatus('🎵 加载音乐中...', false);
            }
        }
        setInterval(() => {
            if(audio && isPlaying && audio.paused && audio.readyState > 0) {
                // 如果状态不一致自动修复
                isPlaying = false;
                updatePlayState(false);
                updatePanelStatus('⏸️ 音乐已停止', false);
            }
        }, 500);
    })();
</script>
</body>
</html>
