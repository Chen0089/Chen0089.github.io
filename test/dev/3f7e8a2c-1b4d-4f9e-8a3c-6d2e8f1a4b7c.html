<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>音乐魔球 · 拖拽点歌</title>
    <style>
      /* 干净简洁 —— 无背景装饰，只保留核心交互 */
      * {
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f2e9f0; /* 柔和纯色背景，无复杂渐变/粒子 */
        font-family: system-ui, "Segoe UI", "Quicksand", sans-serif;
        overflow: hidden;
        position: relative;
        cursor: default;
      }

      /* 可拖拽圆球主体 */
      .draggable-ball {
        position: absolute;
        width: 96px;
        height: 96px;
        background: radial-gradient(circle at 35% 35%, #ff9a5f, #e6492d);
        border-radius: 50%;
        box-shadow: 0 18px 28px rgba(0, 0, 0, 0.25),
          0 0 0 4px rgba(255, 215, 150, 0.6), inset 0 -3px 0 rgba(0, 0, 0, 0.1);
        cursor: grab;
        transition: box-shadow 0.12s ease, transform 0.05s linear;
        z-index: 1000;
        display: flex;
        justify-content: center;
        align-items: center;
        will-change: left, top;
      }

      .draggable-ball:active {
        cursor: grabbing;
        box-shadow: 0 12px 22px rgba(0, 0, 0, 0.3),
          0 0 0 7px rgba(255, 200, 120, 0.8);
        transform: scale(0.97);
      }

      /* 球内音符图标 + 动态小元素 */
      .ball-icon {
        font-size: 48px;
        filter: drop-shadow(2px 3px 3px rgba(0, 0, 0, 0.25));
        pointer-events: none;
        color: #fff7e8;
        transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }

      /* 播放时的轻微脉动 */
      .draggable-ball.playing {
        animation: gentlePulse 1.4s infinite ease-out;
        box-shadow: 0 0 0 0 rgba(255, 100, 50, 0.5),
          0 18px 28px rgba(0, 0, 0, 0.3);
      }

      @keyframes gentlePulse {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 110, 50, 0.6),
            0 18px 28px rgba(0, 0, 0, 0.3);
        }
        70% {
          box-shadow: 0 0 0 20px rgba(255, 110, 50, 0),
            0 18px 28px rgba(0, 0, 0, 0.3);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(255, 110, 50, 0),
            0 18px 28px rgba(0, 0, 0, 0.3);
        }
      }

      /* ---------- 球内弹出菜单 (悬浮在球上方，完全从球体弹出) ---------- */
      .ball-menu {
        position: absolute;
        bottom: 110%; /* 从球的上方弹出 */
        left: 50%;
        transform: translateX(-50%) scale(0.9);
        background: rgba(30, 25, 35, 0.92);
        backdrop-filter: blur(12px);
        border-radius: 32px;
        padding: 8px 0;
        min-width: 170px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 200, 150, 0.3);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        z-index: 1100;
        pointer-events: none;
      }

      .ball-menu.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) scale(1);
        pointer-events: auto;
      }

      /* 菜单项 */
      .menu-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        color: #fff3e0;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
        border-bottom: 1px solid rgba(255, 220, 150, 0.2);
      }

      .menu-item:last-child {
        border-bottom: none;
      }

      .menu-item:hover {
        background: rgba(255, 140, 70, 0.6);
      }

      .menu-item span:first-child {
        font-size: 1.2rem;
      }

      /* 状态提示小球内弹出 (toast风格，从球心冒泡) */
      .ball-toast {
        position: absolute;
        top: -40px;
        left: 50%;
        transform: translateX(-50%) scale(0.85);
        background: #1e1a24dd;
        backdrop-filter: blur(10px);
        color: #ffefcf;
        padding: 6px 14px;
        border-radius: 60px;
        font-size: 0.75rem;
        font-weight: 500;
        white-space: nowrap;
        pointer-events: none;
        z-index: 1050;
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        border: 1px solid rgba(255, 180, 100, 0.6);
        letter-spacing: 0.5px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      .ball-toast.show-toast {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }

      /* 简单辅助：隐藏所有额外装饰，完全聚焦圆球+菜单 */
      .hidden-debug {
        display: none;
      }

      /* 移动端适配 */
      @media (max-width: 600px) {
        .draggable-ball {
          width: 80px;
          height: 80px;
        }
        .ball-icon {
          font-size: 40px;
        }
        .menu-item {
          padding: 8px 14px;
          font-size: 0.8rem;
        }
        .ball-toast {
          font-size: 0.7rem;
          top: -38px;
          padding: 5px 12px;
        }
      }
    </style>
  </head>
  <body>
    <!-- 可拖拽音乐圆球 -->
    <div
      id="musicBall"
      class="draggable-ball"
      style="left: calc(50% - 48px); top: calc(50% - 48px)"
    >
      <div class="ball-icon">🎵</div>

      <!-- 从球内弹出的菜单 (选择音乐) -->
      <div id="ballMenu" class="ball-menu">
        <div class="menu-item" data-song="music/song1.mp3">
          <span>🎸</span> <span>夏日轻谣</span>
        </div>
        <div class="menu-item" data-song="music/song2.mp3">
          <span>🎹</span> <span>雨夜钢琴</span>
        </div>
        <div class="menu-item" data-song="music/song3.mp3">
          <span>🎧</span> <span>电子幻想</span>
        </div>
        <div class="menu-item" data-song="music/song4.mp3">
          <span>🌸</span> <span>春风笺</span>
        </div>
        <div class="menu-item" data-song="music/song5.mp3">
          <span>🌊</span> <span>海浪与风</span>
        </div>
      </div>

      <!-- 球内弹出状态提示 (短暂toast) -->
      <div id="ballToast" class="ball-toast">✨ 准备就绪</div>
    </div>

    <script>
      (function () {
        // ---------- DOM 元素 ----------
        const ball = document.getElementById("musicBall");
        const menu = document.getElementById("ballMenu");
        const toastEl = document.getElementById("ballToast");
        const iconSpan = ball.querySelector(".ball-icon");

        // ---------- 音频播放器 ----------
        let audio = null; // Audio 实例
        let currentSongSrc = null; // 当前加载的歌曲路径
        let isPlaying = false; // 播放状态标记

        // ---------- 辅助函数：球内弹出提示 (1.5秒自动消失) ----------
        let toastTimer = null;
        function showToast(message, isError = false) {
          if (toastTimer) clearTimeout(toastTimer);
          toastEl.textContent = message;
          toastEl.classList.add("show-toast");
          // 错误提示可稍微延长，但都自然消失
          const duration = isError ? 2000 : 1500;
          toastTimer = setTimeout(() => {
            toastEl.classList.remove("show-toast");
          }, duration);
        }

        // 更新球体视觉状态 (播放脉冲样式 + 图标微变化)
        function updatePlayingVisual(playing) {
          if (playing) {
            ball.classList.add("playing");
            iconSpan.innerHTML = "🎧";
          } else {
            ball.classList.remove("playing");
            iconSpan.innerHTML = "🎵";
          }
        }

        // 停止当前播放并清理资源 (保留audio对象可复用)
        function stopCurrentAudio(resetSrcFlag = false) {
          if (audio) {
            audio.pause();
            audio.currentTime = 0;
            // 移除事件监听避免重复绑定，稍后重新创建audio更干净
            audio.onended = null;
            audio.onerror = null;
          }
          isPlaying = false;
          updatePlayingVisual(false);
          if (resetSrcFlag) {
            currentSongSrc = null;
          }
        }

        // 初始化音频实例 (每次切歌可以重新创建，避免事件混乱)
        function initAudio(src) {
          // 停掉旧的音频，移除旧监听
          if (audio) {
            audio.pause();
            audio.onended = null;
            audio.onerror = null;
            audio = null;
          }
          const newAudio = new Audio();
          newAudio.src = src;
          newAudio.loop = false; // 不自动循环，一首播完停止，自然体验
          newAudio.volume = 0.8;
          // 播放结束事件
          newAudio.onended = () => {
            // 歌曲自然结束
            isPlaying = false;
            updatePlayingVisual(false);
            showToast("🎵 播放完成", false);
            currentSongSrc = null; // 可选，但保留源路径信息不丢失，但状态重置
            // 清除播放标记
          };
          newAudio.onerror = (e) => {
            console.warn("音乐加载失败:", src);
            let errorMsg = "⚠️ 文件不存在或格式错误";
            if (newAudio.error) {
              if (newAudio.error.code === 4)
                errorMsg = "❌ 媒体资源不支持/路径错误";
              else errorMsg = `🎵 加载失败 (${newAudio.error.code})`;
            }
            showToast(`${errorMsg}`, true);
            // 播放失败重置状态
            isPlaying = false;
            updatePlayingVisual(false);
            currentSongSrc = null;
            // 清理audio避免残留
            if (audio) {
              audio.onended = null;
              audio.onerror = null;
            }
            audio = null;
          };
          return newAudio;
        }

        // 核心播放方法: 接收歌曲路径，开始播放或切换
        function playSong(songPath) {
          if (!songPath) {
            showToast("🎼 未选择有效音乐", true);
            return;
          }
          // 如果正在播放同一首歌，不做重复切换，可以提示继续播放
          if (
            currentSongSrc === songPath &&
            audio &&
            !audio.paused &&
            isPlaying
          ) {
            showToast("🎶 正在播放中 ~", false);
            return;
          }
          // 如果当前有播放其他歌曲，先停止并清理
          if (audio) {
            stopCurrentAudio(false);
          }
          // 创建新音频并播放
          const newAudio = initAudio(songPath);
          audio = newAudio;
          currentSongSrc = songPath;

          // 播放尝试 (处理浏览器自动策略，但点击菜单是用户手势触发)
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise
              .then(() => {
                isPlaying = true;
                updatePlayingVisual(true);
                // 提取文件名做友好提示
                let fileName = songPath
                  .split("/")
                  .pop()
                  .replace(".mp3", "")
                  .replace(/_/g, " ");
                showToast(`🎵 正在播放: ${fileName}`, false);
              })
              .catch((err) => {
                console.warn("播放被阻止或失败:", err);
                isPlaying = false;
                updatePlayingVisual(false);
                showToast("🔇 播放失败，请检查音乐文件路径", true);
                currentSongSrc = null;
                audio = null;
              });
          }
        }

        // ---------- 拖拽逻辑 (完美支持鼠标+触摸，不影响点击菜单) ----------
        let isDragging = false;
        let startX = 0,
          startY = 0;
        let initialLeft = 0,
          initialTop = 0;
        let dragMoved = false; // 是否移动超过阈值，用于区分拖拽和点击

        // 边界限制函数 (确保圆球不超出窗口)
        function clampPosition(left, top, ballW, ballH) {
          const maxX = window.innerWidth - ballW;
          const maxY = window.innerHeight - ballH;
          return {
            left: Math.min(Math.max(0, left), maxX),
            top: Math.min(Math.max(0, top), maxY),
          };
        }

        function onDragStart(e) {
          // 阻止默认避免拖拽时选中/页面滚动
          e.preventDefault();
          let clientX, clientY;
          if (e.type === "mousedown") {
            clientX = e.clientX;
            clientY = e.clientY;
            window.addEventListener("mousemove", onDragMove);
            window.addEventListener("mouseup", onDragEnd);
          } else if (e.type === "touchstart") {
            if (e.touches.length) {
              clientX = e.touches[0].clientX;
              clientY = e.touches[0].clientY;
            } else return;
            window.addEventListener("touchmove", onDragMove, {
              passive: false,
            });
            window.addEventListener("touchend", onDragEnd);
            window.addEventListener("touchcancel", onDragEnd);
          } else return;

          // 记录起始位置
          initialLeft = ball.offsetLeft;
          initialTop = ball.offsetTop;
          startX = clientX;
          startY = clientY;
          isDragging = true;
          dragMoved = false;
          ball.style.transition = "none";
          // 拖拽时如果菜单开着, 优雅关闭菜单 (避免遮挡)
          if (menu.classList.contains("show")) {
            menu.classList.remove("show");
          }
        }

        function onDragMove(e) {
          if (!isDragging) return;
          e.preventDefault();
          let clientX, clientY;
          if (e.type === "mousemove") {
            clientX = e.clientX;
            clientY = e.clientY;
          } else if (e.type === "touchmove") {
            if (e.touches.length) {
              clientX = e.touches[0].clientX;
              clientY = e.touches[0].clientY;
            } else return;
          } else return;

          let dx = clientX - startX;
          let dy = clientY - startY;
          if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
            dragMoved = true;
          }

          let newLeft = initialLeft + dx;
          let newTop = initialTop + dy;
          const ballRect = ball.getBoundingClientRect();
          const ballW = ballRect.width;
          const ballH = ballRect.height;
          const clamped = clampPosition(newLeft, newTop, ballW, ballH);
          ball.style.left = clamped.left + "px";
          ball.style.top = clamped.top + "px";
        }

        function onDragEnd(e) {
          if (!isDragging) return;
          // 移除全局监听
          window.removeEventListener("mousemove", onDragMove);
          window.removeEventListener("mouseup", onDragEnd);
          window.removeEventListener("touchmove", onDragMove);
          window.removeEventListener("touchend", onDragEnd);
          window.removeEventListener("touchcancel", onDragEnd);

          ball.style.transition = "";
          // 如果几乎没有移动（点击行为），则触发菜单开关 (弹出/收起菜单)
          if (!dragMoved) {
            // 点击圆球: 切换菜单显示/隐藏 (从球内弹出或收回)
            toggleMenu();
          }
          isDragging = false;
          dragMoved = false;
        }

        // 切换菜单显示/隐藏 (从球内部弹出)
        function toggleMenu() {
          // 如果菜单正在显示，就关闭；否则打开菜单
          if (menu.classList.contains("show")) {
            menu.classList.remove("show");
            // 可加一个小反馈: 菜单关闭无提示
          } else {
            // 打开菜单前，确保菜单位置相对于球是弹窗 (bottom:110%已经由css保证)
            menu.classList.add("show");
            // 避免菜单溢出顶部边界: 如果球太靠近顶部，菜单可能超出屏幕顶部，动态调整方向
            adjustMenuDirection();
          }
        }

        // 智能调整菜单弹出方向: 如果圆球位于屏幕上方过近，菜单朝下弹出 (从球下方弹出)
        function adjustMenuDirection() {
          const ballRect = ball.getBoundingClientRect();
          const menuHeight = 200; // 预估菜单高度约200px
          // 如果球距离顶部小于菜单高度+20px，则菜单改为从球下方弹出 (bottom改为auto, top设为110%)
          if (ballRect.top < menuHeight + 30) {
            menu.style.bottom = "auto";
            menu.style.top = "110%";
            menu.style.transform = "translateX(-50%) scale(0.9)";
            // 需要重新显示动画
            if (menu.classList.contains("show")) {
              // 强行更新渲染
              menu.style.transform = "translateX(-50%) scale(1)";
            }
          } else {
            // 默认从上方弹出
            menu.style.bottom = "110%";
            menu.style.top = "auto";
            menu.style.transform = "translateX(-50%) scale(0.9)";
            if (menu.classList.contains("show")) {
              menu.style.transform = "translateX(-50%) scale(1)";
            }
          }
          // 确保显示时transform正确
          if (menu.classList.contains("show")) {
            setTimeout(() => {
              if (menu.classList.contains("show")) {
                menu.style.transform = "translateX(-50%) scale(1)";
              }
            }, 5);
          }
        }

        // ---------- 菜单项点击播放音乐 (从music文件夹读取) ----------
        function bindMenuEvents() {
          const items = document.querySelectorAll(".menu-item");
          items.forEach((item) => {
            item.addEventListener("click", (e) => {
              e.stopPropagation(); // 防止冒泡到球体
              const songPath = item.getAttribute("data-song");
              if (songPath) {
                playSong(songPath);
              } else {
                showToast("无效歌曲路径", true);
              }
              // 选中歌曲后，优雅关闭菜单
              menu.classList.remove("show");
              // 给予反馈toast已经由playSong内部提供，无需额外
            });
          });
        }

        // ---------- 点击全局区域关闭菜单 (点击球外任意区域菜单关闭，但球内菜单点击不会关闭因为已经关闭) ----------
        function closeMenuOnOutside(e) {
          // 如果菜单没显示，不管
          if (!menu.classList.contains("show")) return;
          // 判断点击目标是否在球内或菜单内
          let target = e.target;
          let isInsideBall = ball.contains(target);
          let isInsideMenu = menu.contains(target);
          if (!isInsideBall && !isInsideMenu) {
            menu.classList.remove("show");
          }
        }

        // 窗口resize重新校准边界，避免球出界，同时调整菜单方向
        function onWindowResize() {
          const left = ball.offsetLeft;
          const top = ball.offsetTop;
          const ballW = ball.offsetWidth;
          const ballH = ball.offsetHeight;
          const clamped = clampPosition(left, top, ballW, ballH);
          if (clamped.left !== left || clamped.top !== top) {
            ball.style.left = clamped.left + "px";
            ball.style.top = clamped.top + "px";
          }
          if (menu.classList.contains("show")) {
            adjustMenuDirection();
          }
        }

        // 额外：如果球体播放歌曲时点击菜单选曲，会正常切换，并且菜单关闭，体验完美

        // ---------- 初始化位置 & 注册事件 ----------
        function init() {
          // 设定球体初始位置居中
          const ballW = ball.offsetWidth;
          const ballH = ball.offsetHeight;
          const centerX = (window.innerWidth - ballW) / 2;
          const centerY = (window.innerHeight - ballH) / 2;
          ball.style.left = centerX + "px";
          ball.style.top = centerY + "px";

          // 拖拽事件
          ball.addEventListener("mousedown", onDragStart);
          ball.addEventListener("touchstart", onDragStart, { passive: false });

          // 菜单交互
          bindMenuEvents();

          // 点击文档任意位置关闭菜单 (优雅)
          document.addEventListener("click", closeMenuOnOutside);
          // 窗口resize边界修正
          window.addEventListener("resize", onWindowResize);

          // 预检查 music 文件夹提示 (可选)
          // 显示简单就绪toast但不打扰
          setTimeout(() => {
            showToast("✨ 点击圆球打开歌单", false);
          }, 300);
        }

        // 为了确保所有资源就绪，启动
        init();
      })();
    </script>
  </body>
</html>
